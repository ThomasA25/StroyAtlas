<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1100" viewBox="0 0 1000 1100">
  <defs>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cde0e6"/>
      <stop offset="1" stop-color="#b6cdd6"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.45" r="0.8">
      <stop offset="0.7" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#1d2a33" stop-opacity="0.3"/>
    </radialGradient>
  </defs>

  <!-- Ocean -->
  <rect width="1000" height="1100" fill="url(#sea)"/>

  <!-- Faint graticule -->
  <g stroke="#8fb0bd" stroke-width="0.6" opacity="0.3">
    <path d="M0 220H1000M0 440H1000M0 660H1000M0 880H1000"/>
    <path d="M200 0V1100M400 0V1100M600 0V1100M800 0V1100"/>
  </g>

  <!-- Essos (eastern continent, right edge) — Pentos sits on this coast -->
  <path d="M1000 40
           C946 120 922 210 930 300
           C938 380 970 430 940 520
           C912 600 902 680 932 770
           C958 860 984 960 1000 1050
           L1000 1100 L1000 0 Z"
        fill="#e6dab9" stroke="#9c8e6a" stroke-width="2"/>

  <!-- Westeros (main continent): North at top, the Neck pinch mid-map, the Vale
       bulging east, the Crownlands cape, and Dorne reaching the south. -->
  <path d="M262 175
           L300 110 L352 78 L410 60 L462 74 L505 96
           L545 168 L560 248 L556 300 L512 360
           L548 400 L575 408 L728 442 L688 486 L650 515
           L600 548 L628 572 L663 592 L701 642 L668 666
           L656 678 L612 694 L606 720 L648 762 L650 822
           L612 866 L560 930 L520 985 L470 1035 L398 1022
           L348 992 L312 940 L286 882 L252 836 L236 760
           L258 690 L272 648 L250 590 L256 548 L300 498
           L332 452 L300 405 L276 340 L258 262 Z"
        fill="#e7dcc1" stroke="#9c8e6a" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- The Wall: the great ice line across the far North -->
  <line x1="322" y1="92" x2="520" y2="92" stroke="#dfeef2" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
  <line x1="322" y1="92" x2="520" y2="92" stroke="#9bb6bf" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Mountains of the Vale + the Westerlands -->
  <g stroke="#8a7d5c" stroke-width="1.6" fill="none" opacity="0.5" stroke-linejoin="round">
    <path d="M612 470l11-13 11 13 11-13 11 13"/>
    <path d="M648 500l11-13 11 13 11-13 11 13"/>
    <path d="M300 575l11-13 11 13 11-13 11 13"/>
    <path d="M360 640l11-13 11 13 11-13 11 13"/>
  </g>

  <!-- The Kingswood (forest south of the Blackwater) -->
  <g fill="#9bb083" opacity="0.5">
    <circle cx="548" cy="688" r="10"/><circle cx="566" cy="696" r="8"/><circle cx="534" cy="700" r="7"/>
  </g>

  <!-- Islands of the Narrow Sea: Dragonstone & Driftmark -->
  <ellipse cx="750" cy="628" rx="22" ry="16" fill="#e7dcc1" stroke="#9c8e6a" stroke-width="2"/>
  <ellipse cx="722" cy="664" rx="15" ry="11" fill="#e7dcc1" stroke="#9c8e6a" stroke-width="2"/>

  <!-- The Stepstones (island chain in the southern Narrow Sea) -->
  <g fill="#e7dcc1" stroke="#9c8e6a" stroke-width="1.5">
    <circle cx="792" cy="884" r="7"/><circle cx="815" cy="900" r="8"/>
    <circle cx="840" cy="888" r="6"/><circle cx="832" cy="914" r="5"/><circle cx="806" cy="918" r="5"/>
    <circle cx="858" cy="906" r="4"/>
  </g>

  <!-- Region labels -->
  <g fill="#7c8a6e" font-family="Georgia, 'Times New Roman', serif" font-style="italic">
    <text x="360" y="250" font-size="34" letter-spacing="6" opacity="0.55">WESTEROS</text>
    <text x="970" y="540" font-size="26" letter-spacing="5" text-anchor="end" fill="#9a8d63" opacity="0.5">ESSOS</text>
  </g>
  <g fill="#6f7d63" font-family="Georgia, serif" font-style="italic" opacity="0.6" text-anchor="middle">
    <text x="395" y="330" font-size="17">The North</text>
    <text x="648" y="455" font-size="15">The Vale</text>
    <text x="430" y="560" font-size="15">Riverlands</text>
    <text x="300" y="615" font-size="14">Westerlands</text>
    <text x="360" y="780" font-size="15">The Reach</text>
    <text x="612" y="660" font-size="12">Crownlands</text>
    <text x="566" y="880" font-size="14">Stormlands</text>
    <text x="430" y="985" font-size="17">Dorne</text>
  </g>

  <!-- Water labels -->
  <g fill="#5f7a86" font-family="Georgia, serif" font-style="italic" opacity="0.5" text-anchor="middle">
    <text x="845" y="560" font-size="16">The Narrow Sea</text>
    <text x="690" y="706" font-size="12">Blackwater Bay</text>
    <text x="640" y="1000" font-size="14">Sea of Dorne</text>
    <text x="150" y="470" font-size="13">Sunset Sea</text>
  </g>

  <!-- Compass rose -->
  <g transform="translate(915 110)" opacity="0.7">
    <circle r="34" fill="none" stroke="#8a7d5c" stroke-width="1.5"/>
    <path d="M0 -32 L7 0 L0 32 L-7 0 Z" fill="#9c8e6a"/>
    <path d="M-32 0 L0 7 L32 0 L0 -7 Z" fill="#c9bd97"/>
    <text x="0" y="-38" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#7c7152">N</text>
  </g>

  <!-- Soft edge vignette + frame -->
  <rect width="1000" height="1100" fill="url(#vignette)"/>
  <rect x="6" y="6" width="988" height="1088" fill="none" stroke="#9c8e6a" stroke-width="2" opacity="0.6"/>
</svg>
