<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1100" viewBox="0 0 1000 1100">
  <defs>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfe2e8"/>
      <stop offset="1" stop-color="#b3cbd5"/>
    </linearGradient>
    <radialGradient id="land" cx="0.45" cy="0.4" r="0.9">
      <stop offset="0" stop-color="#ece2c8"/>
      <stop offset="1" stop-color="#e2d5b6"/>
    </radialGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.45" r="0.8">
      <stop offset="0.68" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#1d2a33" stop-opacity="0.32"/>
    </radialGradient>
  </defs>

  <!-- Ocean -->
  <rect width="1000" height="1100" fill="url(#sea)"/>

  <!-- Faint graticule -->
  <g stroke="#8fb0bd" stroke-width="0.6" opacity="0.28">
    <path d="M0 220H1000M0 440H1000M0 660H1000M0 880H1000"/>
    <path d="M200 0V1100M400 0V1100M600 0V1100M800 0V1100"/>
  </g>

  <!-- Essos (eastern continent, right edge) — Pentos sits on this coast -->
  <path d="M1000 40 C946 120 922 210 930 300 C938 380 970 430 940 520
           C912 600 902 680 932 770 C958 860 984 960 1000 1050 L1000 1100 L1000 0 Z"
        fill="#e6dab9" stroke="#9c8e6a" stroke-width="2"/>

  <!-- Westeros (main continent): the North & the Wall up top, the Bite and the
       Vale to the east, the Neck pinch mid-map, the Crownlands cape, and Dorne
       reaching the south. Smooth coast (centripetal Catmull-Rom beziers). -->
  <path d="M255 200 C251.9 186.3 236.3 173.3 240 165 C244.1 155.8 275 159.6 285 150 C294.5 140.8 290.7 121.3 300 110 C311.1 96.5 333.6 86.3 352 78 C370.3 69.7 391.1 60.4 410 60 C427.8 59.7 445.8 67.8 462 74 C477.3 79.9 491.7 85.1 505 96 C520.9 109 536.6 131.1 548 150 C558.6 167.6 573.1 187.9 572 205 C571 221 546.9 234.3 545 250 C543.2 265.3 561.4 283.3 560 298 C558.7 311.4 549.6 324.6 540 335 C529.5 346.3 507 350.5 498 362 C490.2 372.1 481.6 390 486 398 C490.9 407 516.8 408.4 532 410 C546.5 411.5 556.4 406.4 575 408 C610.5 411.1 722.3 424.3 728 442 C731.1 451.5 708.9 464.7 698 476 C686.3 488.1 674.8 500.8 660 512 C642.9 525 601 536.6 600 548 C599.3 556.3 617.8 564.8 628 572 C638.7 579.5 652.4 584.4 663 592 C673 599.2 683.6 607 690 616 C695.7 623.9 703.2 634.2 701 642 C698.4 651.3 676.1 659.1 668 666 C662.8 670.5 661.8 674.3 656 678 C646.3 684.2 619.8 685.2 612 694 C606.1 700.7 603.4 711 606 720 C609.8 733.4 636.2 747.8 648 762 C658.4 774.5 675.2 789.5 674 800 C673 808.8 658.6 813.1 650 822 C638.5 833.9 625.5 849.9 612 866 C595.9 885.2 567 910.3 560 930 C555.2 943.4 565.8 958.2 560 968 C553.6 978.8 533.5 980.4 520 990 C503.6 1001.7 489.8 1029.4 470 1035 C449.4 1040.9 419.2 1030 398 1022 C379.1 1014.9 362.1 1005.3 348 992 C333.3 978.2 322.3 958.3 312 940 C301.6 921.6 296.3 899.7 286 882 C276.2 865.2 260.2 854.3 252 836 C242.4 814.7 234.8 784.7 236 760 C237.2 736 251.4 710.3 258 690 C263.1 674.2 272.3 663.1 272 648 C271.6 630.2 252 608 250 590 C248.3 575.1 249.7 561.7 256 548 C263.9 530.8 286.9 514.7 300 498 C312 482.7 331.9 467.4 332 452 C332.1 436.4 309 422.5 300 405 C290 385.6 282.8 362.9 276 340 C268.7 315.4 261.4 286.7 258 262 C255 240.3 259 217.4 255 200 Z"
        fill="url(#land)" stroke="#9c8e6a" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- The Iron Islands (Ironman's Bay, off the west coast) -->
  <g fill="url(#land)" stroke="#9c8e6a" stroke-width="1.6">
    <path d="M196 470 q14 -6 22 4 q-2 12 -12 16 q-16 0 -18 -10 z"/>
    <ellipse cx="172" cy="500" rx="13" ry="9"/>
    <ellipse cx="210" cy="520" rx="11" ry="8"/>
    <ellipse cx="184" cy="538" rx="9" ry="7"/>
    <circle cx="156" cy="478" r="6"/>
  </g>

  <!-- Bear Island (the far north-west) -->
  <ellipse cx="212" cy="256" rx="14" ry="10" fill="url(#land)" stroke="#9c8e6a" stroke-width="1.6"/>

  <!-- The Arbor (south-west of Oldtown) -->
  <ellipse cx="216" cy="900" rx="16" ry="11" fill="url(#land)" stroke="#9c8e6a" stroke-width="1.6"/>

  <!-- Tarth (Shipbreaker Bay, off Storm's End) -->
  <ellipse cx="706" cy="790" rx="12" ry="9" fill="url(#land)" stroke="#9c8e6a" stroke-width="1.6"/>

  <!-- Islands of the Narrow Sea: Dragonstone & Driftmark -->
  <ellipse cx="750" cy="628" rx="22" ry="16" fill="url(#land)" stroke="#9c8e6a" stroke-width="2"/>
  <ellipse cx="722" cy="664" rx="15" ry="11" fill="url(#land)" stroke="#9c8e6a" stroke-width="2"/>

  <!-- The Stepstones (broken arm reaching toward Essos) -->
  <g fill="url(#land)" stroke="#9c8e6a" stroke-width="1.5">
    <circle cx="792" cy="884" r="7"/><circle cx="815" cy="900" r="8"/>
    <circle cx="840" cy="888" r="6"/><circle cx="832" cy="914" r="5"/>
    <circle cx="806" cy="918" r="5"/><circle cx="858" cy="906" r="4"/>
  </g>

  <!-- Rivers: the Trident (three forks) and the Blackwater Rush -->
  <g fill="none" stroke="#9cc0cf" stroke-width="2" opacity="0.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M655 514 C600 520 545 516 512 524 C492 528 470 540 452 556"/>
    <path d="M512 524 C500 506 486 484 470 466"/>
    <path d="M512 524 C508 502 506 478 510 452"/>
    <path d="M560 620 C534 612 506 602 478 600 C462 599 450 606 438 614"/>
  </g>

  <!-- Mountains: the Vale (Mountains of the Moon), the Westerlands, and the
       Red Mountains along the Dornish marches -->
  <g stroke="#8a7d5c" stroke-width="1.6" fill="none" opacity="0.5" stroke-linejoin="round">
    <path d="M608 470l11-13 11 13 11-13 11 13"/>
    <path d="M648 498l11-13 11 13 11-13 11 13"/>
    <path d="M676 470l10-12 10 12 10-12 10 12"/>
    <path d="M296 572l11-13 11 13 11-13 11 13"/>
    <path d="M340 632l11-13 11 13 11-13 11 13"/>
    <path d="M392 902l11-12 11 12 11-12 11 12"/>
    <path d="M452 884l11-12 11 12 11-12 11 12"/>
  </g>

  <!-- Forests: the Wolfswood (North) and the Kingswood (south of the Blackwater) -->
  <g fill="#9bb083" opacity="0.5">
    <circle cx="330" cy="262" r="11"/><circle cx="348" cy="270" r="9"/><circle cx="316" cy="274" r="8"/>
    <circle cx="548" cy="688" r="10"/><circle cx="566" cy="696" r="8"/><circle cx="534" cy="700" r="7"/>
  </g>

  <!-- The Wall: the great ice line across the far North -->
  <line x1="322" y1="92" x2="520" y2="92" stroke="#dfeef2" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
  <line x1="322" y1="92" x2="520" y2="92" stroke="#9bb6bf" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Continent labels -->
  <g fill="#7c8a6e" font-family="Georgia, 'Times New Roman', serif" font-style="italic">
    <text x="360" y="250" font-size="34" letter-spacing="6" opacity="0.55">WESTEROS</text>
    <text x="970" y="540" font-size="26" letter-spacing="5" text-anchor="end" fill="#9a8d63" opacity="0.5">ESSOS</text>
  </g>

  <!-- Region labels -->
  <g fill="#6f7d63" font-family="Georgia, serif" font-style="italic" opacity="0.62" text-anchor="middle">
    <text x="395" y="330" font-size="17">The North</text>
    <text x="654" y="452" font-size="14">The Vale</text>
    <text x="430" y="560" font-size="15">Riverlands</text>
    <text x="300" y="618" font-size="14">Westerlands</text>
    <text x="356" y="788" font-size="15">The Reach</text>
    <text x="606" y="662" font-size="11">Crownlands</text>
    <text x="572" y="884" font-size="14">Stormlands</text>
    <text x="430" y="988" font-size="17">Dorne</text>
    <text x="176" y="452" font-size="11">Iron Islands</text>
  </g>

  <!-- Water labels -->
  <g fill="#5f7a86" font-family="Georgia, serif" font-style="italic" opacity="0.5" text-anchor="middle">
    <text x="848" y="560" font-size="16">The Narrow Sea</text>
    <text x="660" y="140" font-size="14">Shivering Sea</text>
    <text x="140" y="660" font-size="13">Sunset Sea</text>
    <text x="618" y="360" font-size="12">The Bite</text>
    <text x="694" y="704" font-size="11">Blackwater Bay</text>
    <text x="648" y="1004" font-size="14">Sea of Dorne</text>
  </g>

  <!-- Compass rose -->
  <g transform="translate(915 110)" opacity="0.7">
    <circle r="34" fill="none" stroke="#8a7d5c" stroke-width="1.5"/>
    <path d="M0 -32 L7 0 L0 32 L-7 0 Z" fill="#9c8e6a"/>
    <path d="M-32 0 L0 7 L32 0 L0 -7 Z" fill="#c9bd97"/>
    <text x="0" y="-38" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#7c7152">N</text>
  </g>

  <!-- Soft edge vignette + frame -->
  <rect width="1000" height="1100" fill="url(#vignette)"/>
  <rect x="6" y="6" width="988" height="1088" fill="none" stroke="#9c8e6a" stroke-width="2" opacity="0.6"/>
</svg>
